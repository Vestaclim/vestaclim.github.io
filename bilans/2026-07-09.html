<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bilan climatique — visuels</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
 --bg:#0f1418; --panel:#161d23; --ink:#e8edf1; --muted:#8fa3b0; --line:#26313a;
 --accent:#4aa3df; --warm:#e8743b; --cool:#3db2a0; --hot:#d9455f; --ok:#3fb56b;
 --warn:#e5b23c; --grid:#222c34;
 }
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);
 font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 60px}
 header h1{margin:0 0 4px;font-size:22px;letter-spacing:.2px}
 header.sub{color:var(--muted);font-size:13.5px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;
 padding:18px 20px;margin:18px 0}
.panel h2{margin:0 0 2px;font-size:16px}
.panel.lead{color:var(--muted);font-size:13px;margin:0 0 14px}
.chartbox{position:relative;height:340px}
.chartbox.tall{height:380px}
.legendrow{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--muted);margin-top:10px}
.legendrow.k{display:inline-flex;align-items:center;gap:6px}
.swatch{width:14px;height:4px;border-radius:2px;display:inline-block}
 /* gradient thermometers */
.grad{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.zcol{flex:1 1 90px;min-width:80px;text-align:center}
.therm{height:150px;background:linear-gradient(#0000,#0000);position:relative;
 border-radius:8px;border:1px solid var(--line);overflow:hidden;display:flex;align-items:flex-end}
.fill{width:100%;border-radius:0}
.zname{font-size:12.5px;margin-top:6px}
.zval{font-size:12px;color:var(--muted)}
.floortag{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.gradnote{margin-top:12px;font-size:13px;color:var(--muted)}
.badgeK{display:inline-block;background:#1d2730;border:1px solid var(--line);
 border-radius:20px;padding:3px 11px;color:var(--ink);font-weight:600}
 /* battery */
.batgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
 @media(max-width:640px){.batgrid{grid-template-columns:1fr}}
.bar{height:26px;background:#111820;border:1px solid var(--line);border-radius:8px;
 position:relative;overflow:hidden;margin:6px 0 2px}
.bar>span{position:absolute;top:0;bottom:0;left:0;border-radius:7px}
.barlab{font-size:12.5px;color:var(--muted);display:flex;justify-content:space-between}
.verdict{margin-top:14px;padding:10px 12px;border-left:3px solid var(--accent);
 background:#131b22;border-radius:0 8px 8px 0;font-size:13.5px}
 /* battery v3 — équation + barre de décharge + lentille pièces */
.bkpi{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;margin:2px 0 24px}
.bkpi.card{flex:1 1 140px;background:#131a20;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.bkpi.card.lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.bkpi.card.val{font-size:23px;font-weight:600;margin-top:4px;line-height:1.1}
.bkpi.card.rng{font-size:11.5px;color:var(--muted);margin-top:3px}
.bkpi.card.out.val{color:var(--cool)}
.bkpi.card.stay{border-color:#6a5320;background:#20180b}
.bkpi.card.stay.val{color:var(--warm)}
.bkpi.op{align-self:center;font-size:20px;color:var(--muted);padding:0 1px}
 @media(max-width:640px){.bkpi.op{display:none}.bkpi.card{flex:1 1 100%}}
.ebar{position:relative;height:44px;background:#111820;border:1px solid var(--line);
 border-radius:9px;overflow:hidden}
.ebar.seg{position:absolute;top:0;bottom:0}
.ebar.stays{background:var(--warm)}
.ebar.leaves{background:var(--cool);
 background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.20) 0 2px,transparent 2px 12px);
 background-size:24px 100%;animation:flow 1.15s linear infinite}
 @keyframes flow{to{background-position:24px 0}}
.ebar.surp{position:absolute;top:6px;bottom:6px;border:1.5px dashed var(--cool);border-radius:5px}
.ebar.tip{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px}
.eticks{position:relative;height:15px;margin-top:5px;font-size:11px;color:var(--muted)}
.eticks span{position:absolute;transform:translateX(-50%);white-space:nowrap}
.ebracket{position:relative;height:28px;margin-top:3px}
.ebracket.br{position:absolute;top:0;height:7px;border:1px solid var(--warm);border-top:0;border-radius:0 0 4px 4px}
.ebracket.lb{position:absolute;top:10px;transform:translateX(-50%);font-size:11px;color:var(--warm);white-space:nowrap}
.roomlens{margin-top:20px;border:1px solid var(--line);border-radius:10px;
 background:linear-gradient(90deg,rgba(61,178,160,.14),rgba(232,116,59,.14));padding:24px 18px 16px;position:relative}
.roomlens.cap{position:absolute;top:9px;left:16px;font-size:11px;color:var(--muted)}
.roomlens.track{position:relative;height:2px;background:rgba(255,255,255,.18);margin:36px 0 30px}
.roomlens.rm{position:absolute;top:-4px}
.roomlens.rm.dot{position:absolute;left:0;top:0;transform:translateX(-50%);width:9px;height:9px;border-radius:50%}
.roomlens.rm.rl{position:absolute;left:0;transform:translateX(-50%);white-space:nowrap;font-size:10.5px;color:var(--ink)}
.roomlens.rm.up.rl{bottom:13px}
.roomlens.rm.down.rl{top:14px}
.roomlens.ends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted)}
 /* battery v4 — deux lectures + waterfall */
.vtag{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
 border-top:1px solid var(--line);padding-top:13px;margin-bottom:13px}
.bkpi.card.gain{border-color:#6a5320}
.bkpi.card.gain.val{color:var(--warm)}
.wfwrap{margin:4px 0 6px}
.wf{display:grid;grid-template-columns:138px 1fr;gap:10px;align-items:center;margin:6px 0}
.wf.wlab{font-size:12px;color:var(--muted);text-align:right}
.wf.wbar{position:relative;height:22px;background:#111820;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.wf.wseg{position:absolute;top:0;bottom:0;border-radius:4px}
.wf.wval{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--ink)}
.wf.wm{background:#4a6b7a}
.wf.wg{background:var(--warm);background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.18) 0 2px,transparent 2px 11px)}
.wf.wn{background:var(--cool);background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.18) 0 2px,transparent 2px 12px);background-size:22px 100%;animation:flow 1.15s linear infinite}
.wf.wr{background:var(--warm)}
.vnote{font-size:12.5px;color:var(--muted);margin-top:8px}
 /* battery v5 — barre cumulative unique + repère "maintenant" */
.ebwrap{position:relative;margin:32px 0 26px}
.ebar.acq{background:var(--warm)}
.ebar.tocome{background:var(--warm);opacity:.42;
 background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.22) 0 2px,transparent 2px 11px)}
.ebar.released{background:rgba(61,178,160,.50);
 background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.16) 0 2px,transparent 2px 12px);
 background-size:22px 100%;animation:flow 1.15s linear infinite}
.ebar.mnow{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px}
.ebar.mrest{position:absolute;top:0;bottom:0;border-left:2px dashed #ffd9a0}
.emk{position:absolute;transform:translateX(-50%);font-size:11px;white-space:nowrap}
.emk-now{top:-19px;color:var(--ink)}
.emk-rest{bottom:-19px;color:var(--warm)}
 /* room lens linéaire — étiquettes 2 lignes + Humidex */
.roomlens.tall{padding:32px 18px 20px}
.roomlens.tall.track{margin:48px 0 44px}
.roomlens.rm.rl b{display:block;font-weight:600}
.roomlens.rm.rl.rsub{display:block;font-size:9.5px;color:var(--muted);margin-top:1px}
 /* stratification SVG (axe température bleu→rouge, lignes de rappel) */
.roomsvg{width:100%;height:auto;display:block;margin:8px 0 2px}
.roomsvg text.rn{fill:var(--ink);font-weight:600}
.roomsvg text.rs{fill:var(--muted)}
.roomsvg text.end{fill:var(--muted)}
.strlegend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:4px}
.strlegend.k{display:inline-flex;align-items:center;gap:7px}
 /* hero — état + action */
.hero{border-radius:14px;padding:16px 20px;margin:6px 0 4px;border:1px solid var(--line);background:var(--panel)}
.hero-act{border-left:5px solid var(--hot)}.hero-watch{border-left:5px solid var(--warn)}.hero-ok{border-left:5px solid var(--ok)}
.hero-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.hero-dot{width:11px;height:11px;border-radius:50%}
.hero-act.hero-dot{background:var(--hot);box-shadow:0 0 0 4px rgba(217,69,95,.18)}
.hero-watch.hero-dot{background:var(--warn);box-shadow:0 0 0 4px rgba(229,178,60,.18)}
.hero-ok.hero-dot{background:var(--ok);box-shadow:0 0 0 4px rgba(63,181,107,.18)}
.hero-state{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.hero-action{font-size:19px;font-weight:600;line-height:1.28}
.hero-why{font-size:13.5px;color:var(--muted);margin-top:5px}
 /* tuiles confiance: confort / santé / impact */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:10px 0 4px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.tile.tlab{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.tile.tval{font-size:19px;font-weight:600;margin:5px 0 3px}
.tile.tsub{font-size:11.5px;color:var(--muted);line-height:1.42}
.tile.th-bad{border-color:#5a2230}.tile.th-bad.tval{color:var(--hot)}
.tile.th-warn{border-color:#5a4718}.tile.th-warn.tval{color:var(--warn)}
.tile.th-good.tval{color:var(--ok)}.tile.th-ok.tval{color:var(--ok)}
 /* batterie interactive — curseur + scénario */
.ebctrl{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:18px}
.ebc-lab{font-size:12px;color:var(--muted)}.ebc-lab b{color:var(--ink)}
.ebctrl input[type=range]{flex:1 1 220px;accent-color:var(--warm);height:4px}
.ebtoggle{background:#13202a;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer}
.ebtoggle.off{color:var(--hot);border-color:#5a2230}
.ebwarn{margin-top:12px;font-size:12.5px;color:var(--hot);display:none}
 /* contract */
.ccols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
 @media(max-width:820px){.ccols{grid-template-columns:1fr}}
.ccard{background:#131a20;border:1px solid var(--line);border-radius:10px;padding:12px 13px}
.ccard h3{margin:0 0 9px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.item{display:flex;gap:8px;margin:9px 0;font-size:13px;align-items:flex-start}
.chk{flex:0 0 15px;height:15px;margin-top:2px;border:1.5px solid var(--muted);border-radius:4px}
.item.dl{color:var(--muted);font-size:11.5px}
.st{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;margin-top:3px}
.st.hyp{background:#3a2e12;color:var(--warn);border:1px solid #5a4718}
.st.val{background:#123020;color:var(--ok);border:1px solid #1c4a31}
.st.chk2{background:#2a2030;color:#c79be0;border:1px solid #46335a}
.prio-haute{border-left:3px solid var(--hot);padding-left:8px}
.prio-moyenne{border-left:3px solid var(--warn);padding-left:8px}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px}
.muted{color:var(--muted)}
</style>
</head>

/* ---- 4. Batterie thermique — barre cumulative unique (acquis + à venir = pic du soir) ---- */
if(P.battery){
 const b=D.battery||{};
 const pan=panel('Batterie thermique du bâti',
 'Toute la charge du jour en une barre (100 % = pic du soir). Déplacez le curseur pour voir « maintenant » avancer dans la journée, ou testez « pas de purge ce soir » pour mesurer la dette de demain.');

 const r=(b.residual_kwh||[0,0]), c=(b.night_capacity_kwh||[0,0]);
 const gn=(b.day_gain_kwh||[0,0]);
 const rC=(r[0]+r[1])/2, cC=(c[0]+c[1])/2, gC=(gn[0]+gn[1])/2, pk=(b.power_kw||[0,0]);
 const eve=rC+gC; // pic du soir = 100 %
 const rest=Math.max(0,eve-cC); // charge cumulative restant demain
 const rLo=Math.max(0,(r[0]+gn[0])-c[1]), rHi=Math.max(0,(r[1]+gn[1])-c[0]);
 const sc=eve>0?eve:1, p=v=>Math.max(0,Math.min(100,v/sc*100));

 // équation numérique
 let html='<div class="bkpi">'
 +'<div class="card"><div class="lab">Charge ce matin</div><div class="val">'+rC.toFixed(1)+'</div><div class="rng">08h37 · '+r[0]+'–'+r[1]+' kWh</div></div>'
 +'<div class="op">+</div>'
 +'<div class="card gain"><div class="lab">À accumuler aujourd\'hui</div><div class="val">'+gC.toFixed(1)+'</div><div class="rng">prédit · '+gn[0]+'–'+gn[1]+' kWh</div></div>'
 +'<div class="op">−</div>'
 +'<div class="card out"><div class="lab">Purge de la nuit</div><div class="val">'+cC.toFixed(1)+'</div><div class="rng">à venir · '+c[0]+'–'+c[1]+' kWh · '+pk.join('–')+' kW</div></div>'
 +'<div class="op">=</div>'
 +'<div class="card stay"><div class="lab">Reste demain</div><div class="val">'+rest.toFixed(1)+'</div><div class="rng">'+Math.round(rLo)+'–'+Math.round(rHi)+' kWh</div></div>'
 +'</div>';

 // profil d'accumulation de la journée (pondéré par les degré-heures > 18 °C)
 const tarr=D.t_ext_today||[];
 function wsum(a,bb){ let s=0; for(let h=Math.ceil(a);h<=Math.floor(bb);h++){ if(h>=0&&h<tarr.length) s+=Math.max(0,tarr[h]-18);} return s; }
 const tp=(D.time||'8:00').split(':'); const bilanH=(parseFloat(tp[0])||8)+((parseFloat(tp[1])||0)/60);
 const hEnd=20, totW=wsum(bilanH,hEnd)||1;
 function chargeAt(h){ if(h<=bilanH) return rC; return rC+gC*Math.min(1,Math.max(0,wsum(bilanH,h)/totW)); }
 function fmtH(h){ return Math.floor(h)+'h'+('0'+Math.round((h%1)*60)).slice(-2); }

 // barre cumulative unique (interactive)
 html+='<div class="ebwrap">'
 +'<div class="emk emk-now" id="eb-emknow" style="left:'+p(rC)+'%">'+fmtH(bilanH)+' · '+rC.toFixed(1)+'</div>'
 +'<div class="ebar">'
 +'<div class="seg acq" id="eb-acq" style="left:0;width:'+p(rC)+'%"></div>'
 +'<div class="seg tocome" id="eb-tocome" style="left:'+p(rC)+'%;width:'+(100-p(rC))+'%"></div>'
 +'<div class="seg released" id="eb-released" style="left:'+p(rest)+'%;width:'+(100-p(rest))+'%"></div>'
 +'<div class="mrest" id="eb-mrest" style="left:'+p(rest)+'%"></div>'
 +'<div class="mnow" id="eb-mnow" style="left:'+p(rC)+'%"></div>'
 +'</div>'
 +'<div class="emk emk-rest" id="eb-emkrest" style="left:'+p(rest)+'%">reste demain · '+rest.toFixed(1)+'</div>'
 +'</div>';

 html+='<div class="eticks"><span style="left:0">0</span>'
 +(sc>6?'<span style="left:'+p(5)+'%">5</span>':'')
 +(sc>11?'<span style="left:'+p(10)+'%">10</span>':'')
 +'<span style="left:100%;transform:translateX(-100%)">soir '+eve.toFixed(1)+' kWh</span></div>';

 // contrôles: curseur temporel + scénario
 html+='<div class="ebctrl">'
 +'<span class="ebc-lab">Heure du bilan <b id="eb-hour">'+fmtH(bilanH)+'</b></span>'
 +'<input id="eb-scrub" type="range" min="'+bilanH.toFixed(2)+'" max="'+hEnd+'" step="0.25" value="'+bilanH.toFixed(2)+'">'
 +'<button id="eb-scen" class="ebtoggle" type="button">Scénario: purge ce soir ✓</button>'
 +'</div>';

 html+='<div class="legendrow" style="margin-top:14px">'
 +'<span class="k"><span class="swatch" style="background:var(--warm)"></span>déjà stocké</span>'
 +'<span class="k"><span class="swatch" style="background:var(--warm);opacity:.5"></span>à accumuler</span>'
 +'<span class="k"><span class="swatch" style="background:rgba(61,178,160,.7)"></span>libéré par la purge</span>'
 +'<span class="k"><span class="swatch" style="background:var(--ink);width:3px;height:14px"></span>maintenant · <span class="swatch" style="border-top:2px dashed #ffd9a0;width:14px;height:0"></span>reste demain</span>'
 +'</div>';

 html+='<div class="ebwarn" id="eb-warn">⚠ Sans purge, le bâti garde toute la charge du soir (~'+eve.toFixed(1)+' kWh): demain démarre déjà chaud, et la dette s\'accumule sur la rampe de chaleur.</div>';

 pan.insertAdjacentHTML('beforeend', html);

 // câblage interactif
 const $=s=>pan.querySelector(s);
 const scrub=$('#eb-scrub'), scenBtn=$('#eb-scen'), hourEl=$('#eb-hour'),
 acqEl=$('#eb-acq'), tocomeEl=$('#eb-tocome'), relEl=$('#eb-released'),
 mnowEl=$('#eb-mnow'), mrestEl=$('#eb-mrest'), emkNow=$('#eb-emknow'), emkRest=$('#eb-emkrest'), warnEl=$('#eb-warn');
 let scen=true;
 function updBar(){
 const h=parseFloat(scrub.value), nowC=chargeAt(h), pn=p(nowC);
 acqEl.style.width=pn+'%'; tocomeEl.style.left=pn+'%'; tocomeEl.style.width=(100-pn)+'%';
 mnowEl.style.left=pn+'%'; emkNow.style.left=pn+'%'; emkNow.textContent=fmtH(h)+' · '+nowC.toFixed(1);
 hourEl.textContent=fmtH(h);
 const reste=scen?rest:eve, pr=p(reste);
 relEl.style.display=scen?'block':'none';
 if(scen){ relEl.style.left=pr+'%'; relEl.style.width=(100-pr)+'%'; }
 mrestEl.style.left=pr+'%'; emkRest.style.left=pr+'%'; emkRest.textContent='reste demain · '+reste.toFixed(1);
 warnEl.style.display=scen?'none':'block';
 }
 scrub.addEventListener('input',updBar);
 scenBtn.addEventListener('click',()=>{ scen=!scen;
 scenBtn.textContent=scen?'Scénario: purge ce soir ✓':'Scénario: PAS de purge ✗';
 scenBtn.classList.toggle('off',!scen); updBar(); });
 updBar();

 if(b.verdict){const v=document.createElement('div'); v.className='verdict'; v.textContent=b.verdict; pan.appendChild(v);}
}

/* ---- 5. Comparatif journalier superposé ---- */
if(P.compare){
 const pan=panel('Comparatif journalier superposé — trajectoire de la semaine',
 'Profils de température extérieure jour après jour, sur un axe 0–24 h commun: on lit d\'un coup le réchauffement et la journée clé.');
 const box=document.createElement('div'); box.className='chartbox tall'; const cv=document.createElement('canvas');
 box.appendChild(cv); pan.appendChild(box);
 const cmp=D.compare||[];
 const palette=['#3db2a0','#4aa3df','#e5b23c','#d9455f','#c79be0','#9aa7b0'];
 const ds=cmp.map((c,i)=>({label:c.date,data:c.t,borderColor:palette[i%palette.length],
 borderWidth: i===cmp.length-1?3:2, pointRadius:0, tension:.35,
 borderDash: i===cmp.length-1?[]:[]}));
 new Chart(cv,{type:'line',
 data:{labels:D.hours,datasets:ds},
 options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
 plugins:{legend:{position:'bottom'},tooltip:{callbacks:{title:i=>i[0].label+' h'}}},
 scales:{x:{grid:{color:'#1d262d'},title:{display:true,text:'heure (CEST)'}},
 y:{title:{display:true,text:'T extérieure (°C)'},grid:{color:'#1d262d'}}}}});
}

/* ---- 6. Contrat d'engagement ---- */
if(P.contract){
 const e=D.engagements||{};
 const pan=panel('Contrat d\'engagement du jour',
 'Ce qui est à faire, ce qui a été décidé, et les interprétations en cours — avec leur statut de vérification.');
 const cols=document.createElement('div'); cols.className='ccols';
 // tâches
 let t='<div class="ccard"><h3>Tâches à effectuer</h3>';
 (e.taches||[]).forEach(x=>{ t+=`<div class="item prio-${x.prio||'moyenne'}">
 <span class="chk"></span><span>${x.txt}<br><span class="dl">échéance ${x.deadline||''}${x.prio==='haute'?' · prioritaire':''}</span></span></div>`;});
 t+='</div>';
 // décisions
 let de='<div class="ccard"><h3>Décisions prises</h3>';
 (e.decisions||[]).forEach(x=>{ de+=`<div class="item"><span>•</span><span>${x}</span></div>`;});
 de+='</div>';
 // interprétations
 let it='<div class="ccard"><h3>Interprétations développées</h3>';
 (e.interpretations||[]).forEach(x=>{ const s=(x.statut||'');
 let cls='chk2'; if(s.indexOf('validé')>=0)cls='val'; else if(s.indexOf('hypothèse')>=0)cls='hyp';
 it+=`<div class="item"><span>•</span><span>${x.txt}<br><span class="st ${cls}">${s}</span></span></div>`;});
 it+='</div>';
 cols.innerHTML=t+de+it; pan.appendChild(cols);
}

if(!root.children.length){
 root.innerHTML='<div class="panel muted">Aucun volet déclenché aujourd\'hui (conditions calmes). '
 +'Le rapport texte suffit — usage mesuré.</div>';
}
</script>
</body>
</html>
